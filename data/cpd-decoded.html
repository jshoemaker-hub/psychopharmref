iSEwLZmP9BScoCvufJy\",\"type\":\"Entry\",\"createdAt\":\"2023-09-07T13:07:16.872Z\",\"updatedAt\":\"2025-02-07T13:54:50.382Z\",\"environment\":{\"sys\":{\"id\":\"prod\",\"type\":\"Link\",\"linkType\":\"Environment\"}},\"publishedVersion\":42,\"revision\":12,\"contentType\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"ContentType\",\"id\":\"item\"}},\"locale\":\"en-US\"},\"fields\":{\"itemName\":\"what-is-mark-cuban\",\"itemTitle\":\"What is the Mark Cuban Cost Plus Drug Company?\",\"itemDescription\":\"Mark Cuban Cost Plus Drug Company (more commonly known as Cost Plus Drugs) offers safe medicines at the lowest possible price. We provide complete transparency on the cost of drugs so that patients know they are getting a fair price. As a public-benefit corporation, we prioritize our social mission of improving public health. To learn more about our mission, check out [costplusdrugs.com/mission](/mission).\"}},{\"metadata\":{\"tags\":[],\"concepts\":[]},\"sys\":{\"space\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"Space\",\"id\":\"fcvih6iivo6z\"}},\"id\":\"66sMcTn97OjMojKRSB2Ewi\",\"type\":\"Entry\",\"createdAt\":\"2023-09-07T13:07:17.243Z\",\"updatedAt\":\"2023-09-07T13:07:17.243Z\",\"environment\":{\"sys\":{\"id\":\"prod\",\"type\":\"Link\",\"linkType\":\"Environment\"}},\"publishedVersion\":1,\"revision\":1,\"contentType\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"ContentType\",\"id\":\"item\"}},\"locale\":\"en-US\"},\"fields\":{\"itemName\":\"how-does-it-work\",\"itemTitle\":\"How does Cost Plus Drugs work?\",\"itemDescription\":\"1. Find your medication in our online store by searching, browsing alphabetically or by medical condition.\\n2. Once you’ve found your medication, [sign up for an account](/create-account).\\n3. Reach out to your doctor or provider with our provided instructions ([costplusdrugs.com/contact-your-doctor](/contact-your-doctor)) to receive your prescriptions.\\n4. Once we receive a prescription from your doctor, you’ll be notified to checkout.\\n5. Your medications will be delivered straight to your door in just a few days.\\n\"}},{\"metadata\":{\"tags\":[],\"concepts\":[]},\"sys\":{\"space\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"Space\",\"id\":\"fcvih6iivo6z\"}},\"id\":\"2lnkzBhZL85PTkefqpODkm\",\"type\":\"Entry\",\"createdAt\":\"2023-09-07T13:07:17.576Z\",\"updatedAt\":\"2023-09-07T13:07:17.576Z\",\"environment\":{\"sys\":{\"id\":\"prod\",\"type\":\"Link\",\"linkType\":\"Environment\"}},\"publishedVersion\":1,\"revision\":1,\"contentType\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"ContentType\",\"id\":\"item\"}},\"locale\":\"en-US\"},\"fields\":{\"itemName\":\"prices-cheap\",\"itemTitle\":\"How are your prices so cheap?\",\"itemDescription\":\"Our prices are the true cost to get each medication from the manufacturer to you. We cut out the pharmacy middlemen and negotiate directly with manufacturers to get the best possible price. Then, we show you exactly how much you’ll pay for us to keep our business running and how much it will cost to prepare and ship your prescription.  \"}},{\"metadata\":{\"tags\":[],\"concepts\":[]},\"sys\":{\"space\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"Space\",\"id\":\"fcvih6iivo6z\"}},\"id\":\"2jRFWROKVH0A4Enf6fyZYF\",\"type\":\"Entry\",\"createdAt\":\"2023-09-07T13:07:26.260Z\",\"updatedAt\":\"2026-04-28T17:52:59.068Z\",\"environment\":{\"sys\":{\"id\":\"prod\",\"type\":\"Link\",\"linkType\":\"Environment\"}},\"publishedVersion\":57,\"revision\":19,\"contentType\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"ContentType\",\"id\":\"item\"}},\"locale\":\"en-US\"},\"fields\":{\"itemName\":\"can-I-use-insurance\",\"itemTitle\":\"Can I use my insurance?\",\"itemDescription\":\"\u003cp\u003eCurrently, we only accept prescription insurance for the following insurance providers. However, we will be adding more insurance plans in the coming months. If you aren’t sure if Cost Plus Drugs accepts your insurance, please contact your insurance company and ask if Mark Cuban Cost Plus Drug Company is an “in-network pharmacy\\\" with your prescription plan.\u003cp\u003e\\n\\n\u003cp\u003e AffirmedRx, Archimedes, Capital Blue Cross, Drexi, FairosRx, Liviniti, LucyRx, MedOne, Network Health Plan, NWA ECH Health Plan, Oread Rx, PCA Rx, PharmPix, Prescryptive, Rightway, RxPreferred, RxSaveCard, Scripius, SelectHealth, SevaRx, SGRX, SmithRx, TransparentRx, True Rx Health Strategists, TrueScripts, VIVIO, WellDyne, and other select prescription plans.\u003c/p\u003e\"}},{\"metadata\":{\"tags\":[],\"concepts\":[]},\"sys\":{\"space\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"Space\",\"id\":\"fcvih6iivo6z\"}},\"id\":\"3575KA59m4R3Vu64DpdJP3\",\"type\":\"Entry\",\"createdAt\":\"2023-09-07T13:07:19.499Z\",\"updatedAt\":\"2023-09-07T13:07:19.499Z\",\"environment\":{\"sys\":{\"id\":\"prod\",\"type\":\"Link\",\"linkType\":\"Environment\"}},\"publishedVersion\":1,\"revision\":1,\"contentType\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"ContentType\",\"id\":\"item\"}},\"locale\":\"en-US\"},\"fields\":{\"itemName\":\"what-do-I-do\",\"itemTitle\":\"My provider sent me here. What do I do next?\",\"itemDescription\":\"Just sign up for an account and the prescription from your doctor will be connected to your account. Then, our pharmacy partner will notify you when you’re ready to checkout and get your medications delivered.\"}},{\"metadata\":{\"tags\":[],\"concepts\":[]},\"sys\":{\"space\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"Space\",\"id\":\"fcvih6iivo6z\"}},\"id\":\"3eXwpWI6tzijCXvIoZpT63\",\"type\":\"Entry\",\"createdAt\":\"2023-09-07T13:07:26.562Z\",\"updatedAt\":\"2023-10-18T12:05:56.300Z\",\"environment\":{\"sys\":{\"id\":\"prod\",\"type\":\"Link\",\"linkType\":\"Environment\"}},\"publishedVersion\":6,\"revision\":3,\"contentType\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"ContentType\",\"id\":\"item\"}},\"locale\":\"en-US\"},\"fields\":{\"itemName\":\"Does-MC-own-pharmacy\",\"itemTitle\":\"Does Mark Cuban really own this company?\",\"itemDescription\":\"Yes! Investor Mark Cuban and CEO Dr. Alexander Oshmyansky strongly believe that every American should have access to safe, affordable medicines. Many Americans are spending crazy amounts of money each month just to stay healthy. We know there’s a better way. We work with HealthDyne, our trusted fulfillment partner to fill your prescriptions from their accredited pharmacies. HealthDyne's licensed pharmacists will ensure your medication is safely dispensed and shipped to you, and they are available 24/7 for consultations or questions about your medication. To learn more about our mission and how Mark Cuban has been involved, check out [Our Mission](/mission).\"}},{\"metadata\":{\"tags\":[],\"concepts\":[]},\"sys\":{\"space\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"Space\",\"id\":\"fcvih6iivo6z\"}},\"id\":\"4PCOkxafgqwuLWRwam92X5\",\"type\":\"Entry\",\"createdAt\":\"2023-09-07T13:07:26.855Z\",\"updatedAt\":\"2023-10-18T12:05:14.236Z\",\"environment\":{\"sys\":{\"id\":\"prod\",\"type\":\"Link\",\"linkType\":\"Environment\"}},\"publishedVersion\":5,\"revision\":3,\"contentType\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"ContentType\",\"id\":\"item\"}},\"locale\":\"en-US\"},\"fields\":{\"itemName\":\"who-fills-my-prescription\",\"itemTitle\":\"Who fills my prescription?\",\"itemDescription\":\"We work with HealthDyne, our trusted fulfillment partner to fill your prescriptions. HealthDyne's accredited pharmacists will ensure your medication is safe and delivered to your doorstep on time.\"}},{\"metadata\":{\"tags\":[],\"concepts\":[]},\"sys\":{\"space\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"Space\",\"id\":\"fcvih6iivo6z\"}},\"id\":\"5g2Fen1I8Ue5r0szCiz7W9\",\"type\":\"Entry\",\"createdAt\":\"2023-09-07T13:07:31.599Z\",\"updatedAt\":\"2023-09-07T13:07:31.599Z\",\"environment\":{\"sys\":{\"id\":\"prod\",\"type\":\"Link\",\"linkType\":\"Environment\"}},\"publishedVersion\":1,\"revision\":1,\"contentType\":{\"sys\":{\"type\":\"Link\",\"linkType\":\"ContentType\"
