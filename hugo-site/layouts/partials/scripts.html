<script>
// Sidebar nav group toggle
document.querySelectorAll('.nav-parent-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.preventDefault();
    const group = btn.closest('.nav-group');
    const isOpen = group.classList.contains('open');
    document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
    if (!isOpen) group.classList.add('open');
  });
});

// Highlight current page in sidebar
(function() {
  const currentPath = window.location.pathname;
  document.querySelectorAll('#sidebar .nav-sub-link').forEach(link => {
    const href = link.getAttribute('href');
    // Match either exact path or with/without trailing slash
    if (href === currentPath || href === currentPath + '/' || href + '/' === currentPath) {
      link.classList.add('active');
      // Scroll active link into view in sidebar
      setTimeout(() => link.scrollIntoView({ block: 'center', behavior: 'smooth' }), 100);
    }
  });
})();
</script>

<script>
(function() {
  var btn = document.getElementById('mobile-menu-btn');
  var sidebar = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebar-overlay');
  if (!btn || !sidebar || !overlay) return;
  function open() { sidebar.classList.add('sidebar-open'); overlay.classList.add('overlay-visible'); document.body.classList.add('sidebar-is-open'); }
  function close() { sidebar.classList.remove('sidebar-open'); overlay.classList.remove('overlay-visible'); document.body.classList.remove('sidebar-is-open'); }
  btn.addEventListener('click', function() { sidebar.classList.contains('sidebar-open') ? close() : open(); });
  overlay.addEventListener('click', close);
  // Close sidebar when clicking nav links on mobile
  sidebar.querySelectorAll('a').forEach(function(a) { a.addEventListener('click', function() { if (window.innerWidth <= 768) close(); }); });
})();
</script>

<!-- Unified Search (Hugo blog pages — articles only) -->
<script>
(function() {
  var input = document.getElementById('us-input');
  var results = document.getElementById('us-results');
  if (!input || !results) return;

  var searchIndex = null;
  var timer = null;

  input.addEventListener('focus', function() {
    if (searchIndex) return;
    fetch('/index.json')
      .then(function(r) { return r.json(); })
      .then(function(data) { searchIndex = data; })
      .catch(function() {
        searchIndex = [];
        document.querySelectorAll('#sidebar .nav-sub-link[href*="/blog/"]').forEach(function(a) {
          var cat = '';
          var prev = a.closest('li');
          while (prev && prev.previousElementSibling) {
            prev = prev.previousElementSibling;
            if (prev.classList && prev.classList.contains('nav-sub-divider')) { cat = prev.textContent.trim(); break; }
          }
          searchIndex.push({ title: a.textContent.trim(), url: a.getAttribute('href'), category: cat, description: '', content: '' });
        });
      });
  });

  input.addEventListener('input', function() { clearTimeout(timer); timer = setTimeout(doSearch, 120); });
  document.addEventListener('click', function(e) { if (!e.target.closest('.us-wrap')) results.classList.remove('open'); });
  input.addEventListener('keydown', function(e) {
    var items = results.querySelectorAll('.us-item');
    var focused = results.querySelector('.us-item:focus');
    if (e.key === 'ArrowDown') { e.preventDefault(); if (!focused && items.length) items[0].focus(); else if (focused && focused.nextElementSibling) focused.nextElementSibling.focus(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); if (focused && focused.previousElementSibling) focused.previousElementSibling.focus(); else input.focus(); }
    else if (e.key === 'Escape') { results.classList.remove('open'); input.blur(); }
  });

  function doSearch() {
    var q = input.value.trim().toLowerCase();
    if (!q || q.length < 2 || !searchIndex) { results.classList.remove('open'); results.innerHTML = ''; return; }
    var terms = q.split(/\s+/);
    var matches = searchIndex.filter(function(item) {
      var hay = (item.title + ' ' + item.description + ' ' + item.category + ' ' + (item.content || '')).toLowerCase();
      return terms.every(function(t) { return hay.indexOf(t) >= 0; });
    }).slice(0, 10);

    if (!matches.length) { results.innerHTML = '<div class="us-empty">No results for "' + q + '"</div>'; results.classList.add('open'); return; }
    results.innerHTML = '<div class="us-group-label">Blog Articles</div>' + matches.map(function(item) {
      var title = hl(item.title, terms);
      var cat = item.category ? '<span class="us-item-sub">' + item.category + '</span>' : '';
      return '<a href="' + item.url + '" class="us-item"><span class="us-item-type us-item-type--blog">Article</span><span class="us-item-title">' + title + '</span>' + cat + '</a>';
    }).join('');
    results.classList.add('open');
  }

  function hl(text, terms) {
    terms.forEach(function(t) { if (t.length < 2) return; text = text.replace(new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>'); });
    return text;
  }
})();
</script>
