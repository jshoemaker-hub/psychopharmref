baseURL = "https://psychopharmref.com"
languageCode = "en-us"
title = "PsychoPharmRef — Psychopharmacology Reference for Clinicians"
defaultContentLanguage = "en"

[params]
  description = "Free clinical psychopharmacology reference with 91 medications, receptor binding profiles, P450 interactions, 15+ clinical tools, and 68 evidence-based blog posts."
  author = "Jerad Shoemaker, MD"
  authorJobTitle = "Psychiatrist"
  ga4ID = "G-RK6J3FQ9L7"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true

[minify]
  minifyOutput = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepEndTags = true
      keepWhitespace = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[taxonomies]
  category = "categories"
  tag = "tags"
